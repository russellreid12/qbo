# =============================================================================
# QBO config example — copy to /opt/qbo/config.yml and edit.
# =============================================================================
#
# AUDIO: two profiles below (robot vs AirPods). Only one profile may be active:
#   • Comment out the ACTIVE block for the profile you are NOT using.
#   • Uncomment the INACTIVE block for the profile you want.
#   • Do not leave duplicate keys (YAML keeps the last one — avoid confusion).
#
# AirPods: use Bluetooth HFP (mic + headphones). Set PipeWire defaults so
#   "pulse" hits the buds (wpctl set-default <sink id> and <source id>).
#   python3 -c "import speech_recognition as sr; print(*enumerate(sr.Microphone.list_microphone_names()), sep='\n')" 2>/dev/null
#   → use index for "pulse" (often 5) if you use the AirPods mic profile.
# =============================================================================

distro: standalone
language: english
startWith: interactive-dialogflow
volume: 100
microphoneGain: 100
camera: 0
# Head rest pose: headYPosition 0–100 maps tilt (Y); headXPosition 0–100 maps pan (X). Omit headXPosition for legacy default (511).
# If the head starts too far to the robot’s right, lower headXPosition (e.g. 45–48). Too far left: raise toward 55–60.
headYPosition: 39
# headXPosition: 48
servoSpeed: 100

# Face tracking (PiFaceFast): invert pan/tilt if the head turns the wrong way; center offsets (pixels) fix steady left/right/up/down bias vs the camera.
# faceTrackingInvertPan: true
# faceTrackingInvertTilt: false
# faceTrackingCenterOffsetX: 0   # positive = aim slightly left in frame (nudges pan if image center is biased)
# faceTrackingCenterOffsetY: 0
# cameraFlipHorizontal: false
SpeechToTextListeningTime: 5
serialPort: /dev/serial0

# Touch sensors (GET_TOUCH): flash nose + servo LEDs when petted; off again after touch cooldown (PiFaceFast).
touchReactionLights: true
touchReactionServoLeds: true
# Nose color: 0=off, 1=blue, 2=orange, 4=green (same as SetNoseColor elsewhere).
touchNoseColor: 2

tokenAPIai: ''
gassistant_proyectid: ''
dialogflowv2_projectid: ''

# -----------------------------------------------------------------------------
# LLM Natural Language Generation (Dialogflow V2 mode)
# Set llm_provider to 'openai' or 'gemini' to make QBO respond naturally.
# Leave as 'none' to use Dialogflow's canned fulfillment text only.
# -----------------------------------------------------------------------------
llm_provider: none         # 'openai' | 'gemini' | 'none'

# --- OpenAI (GPT) ---
# Get key at: https://platform.openai.com/api-keys
# Recommended model: gpt-4o-mini (fast + cheap) or gpt-4o (highest quality)
openai_api_key: ''
openai_model: gpt-4o-mini

# --- Google Gemini ---
# Get key at: https://aistudio.google.com/app/apikey
# Recommended model: gemini-1.5-flash (fast + free tier available)
gemini_api_key: ''
gemini_model: gemini-1.5-flash

# --- Shared LLM settings ---
# robot_persona: personality prompt sent to the LLM on every turn
robot_persona: "You are QBO, a friendly and curious social robot. Keep every reply short — 1 to 2 sentences — and conversational. Never use markdown, bullet points, or lists in your responses."
llm_max_tokens: 80         # keep short for faster TTS (raise for longer answers)
llm_temperature: 0.7       # 0.0 = deterministic, 1.0 = creative

# -----------------------------------------------------------------------------
# AUDIO PROFILES — toggle robot vs AirPods (see instructions at top)
# -----------------------------------------------------------------------------

# ----- PROFILE: ROBOT (onboard MAX98357 / Voice HAT) -----
#audioPlaybackMode: plughw
# Session audio (pulse / default / sysdefault / *pipewire*): auto-fallback tries onboard PCMs if the
# socket is not up yet. Failed tries hide ALSA stderr so logs stay quiet when fallback works.
# Set audioPlaybackAutoFallback: false to disable, or set audioPlaybackFallbackDevice: plughw:0,0
#audioPlaybackAutoFallback: true
# If you use /etc/asound.conf convertQBO instead, comment plughw and use:
# audioPlaybackMode: convertQBO
# Or set an explicit PCM only (then audioPlaybackMode is ignored):
# audioPlaybackDevice: plughw:0,0

# Mic: index of "dmicQBO_sv" from PortAudio list (often 11; verify on your Pi).
# microphoneDeviceIndex: 11
# microphoneAlsaDevice: dmicQBO_sv
# microphoneSampleRate: 16000
# microphoneAlsaSampleRate: 16000

# ----- PROFILE: AIRPODS (PipeWire pulse; comment all ROBOT keys above first) -----
# When switching to AirPods, comment out these five keys from ROBOT:
#   audioPlaybackMode, microphoneDeviceIndex, microphoneAlsaDevice,
#   microphoneSampleRate, microphoneAlsaSampleRate
# Then uncomment the five lines below:
#
audioBootDelay: 10
audioPlaybackDevice: pulse
microphoneDeviceIndex: 5
microphoneAlsaDevice: pulse
microphoneSampleRate: 16000
microphoneAlsaSampleRate: 16000
# If capture fails on HFP CVSD, try 8000 for both sample rates instead of 16000.

# -----------------------------------------------------------------------------
# IBM Watson / other API keys (if distro: ibmwatson)
# -----------------------------------------------------------------------------
AssistantAPIKey: ''
AssistantURL: ''
AssistantID: ''
TextToSpeechAPIKey: ''
TextToSpeechURL: ''
SpeechToTextAPIKey: ''
SpeechToTextURL: ''
VisualRecognitionAPIKey: ''
VisualRecognitionURL: ''
