defaults.pcm.rate_converter "samplerate_best"

# -------- Playback: single plug → hw (no double conversion) --------
pcm.convertQBO {
    type plug
    slave {
        pcm "hw:0,0"
        rate 48000
        channels 2
        format S32_LE
    }
}

ctl.convertQBO {
    type hw
    card 0
}

# -------- Capture (keep your mic chain if recording works) --------
pcm.dmicQBO_sv_hw {
    type plug
    slave {
        pcm "hw:0,0"
        format S32_LE
        rate 48000
        channels 2
    }
    ttable.0.0 0.5
    ttable.0.1 0.5
}

pcm.dmicQBO_sv {
    type softvol
    slave.pcm "dmicQBO_sv_hw"
    control {
        name "Mic Boost"
        card 0
    }
    max_dB 40.0
    min_dB -20.0
    resolution 100
}

ctl.dmicQBO_sv {
    type hw
    card 0
}

# -------- Default: different device for play vs record --------
pcm.!default {
    type asym
    playback.pcm "convertQBO"
    capture.pcm "dmicQBO_sv"
}

ctl.!default {
    type hw
    card 0
}
